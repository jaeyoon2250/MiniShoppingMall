spring.application.name=MiniShoppingMall
server.servlet.context-path=/MiniMall

# H2 in-memory database (앱 재시작 시 초기화되며, DataInitializer가 매번 더미 상품을 다시 채웁니다)
spring.datasource.url=jdbc:h2:mem:minimall;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
